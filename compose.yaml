name: datalores-dayz-tools

services:
  datalores-dayz-tools:
    build: .
    image: datalores-dayz-tools:latest
    container_name: datalores-dayz-tools
    hostname: datalores-dayz-tools
    restart: unless-stopped
    ports:
      - "8187:80"
    volumes:
      - data:/data
    networks:
      proxy:
        aliases:
          - datalores-dayz-tools

networks:
  proxy:
    external: true
    name: proxy

volumes:
  data:
